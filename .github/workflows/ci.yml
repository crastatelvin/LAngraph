name: ci

on:
  push:
  pull_request:

jobs:
  test-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r apps/api/requirements.txt

      - name: Run tests
        run: pytest tests/integration -q

      - name: Run security harness
        run: pytest tests/integration/test_security_harness.py -q

      - name: Run load smoke harness
        run: pytest tests/nonfunctional -q
